          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            func azure functionapp publish uat-ingest-func --python
        displayName: "Deploy Azure Function"

      - powershell: |
          # Power BI refresh script for UAT (same as Dev)
          $tenantId = "$(POWERBI_TENANT_ID)"
          $clientId = "$(POWERBI_CLIENT_ID)"
          $clientSecret = "$(POWERBI_CLIENT_SECRET)"
          $workspaceName = "$(POWERBI_WORKSPACE)"
          $datasetName = "UATAudit"
          # ... same REST API steps ...
        displayName: "Refresh Power BI Dataset"

# =========================
# Stage 3: Prod Deployment
# =========================
